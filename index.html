<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Nolan Pestre</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">NP</div>

    <ul class="nav-links" id="navLinks">
      <li><a href="#hero">Accueil</a></li>
      <li><a href="#projects">Projets</a></li>
    </ul>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </nav>

  <!-- HERO -->
  <header id="hero">
    <div class="hero-content">
      <img src="Pestre Nolan.jpg" class="profile-pic">
      <h1>Nolan Pestre</h1>
      <p>Game Developer Student</p>

      <button class="btn" onclick="scrollToSection('projects')">
        Voir mes projets
      </button>
    </div>
  </header>

  <!-- PROJETS -->
  <section id="projects">
    <h2>Projets</h2>

    <div class="projects-wrapper">

      <button class="arrow left" onclick="scrollProjects(-1)">❮</button>

      <div class="projects" id="projectsContainer">

        <div class="card">
          <div class="video-placeholder">Vidéo du projet ici</div>
          <h3>FPS Prototype</h3>
        </div>

        <div class="card">
          <div class="video-placeholder">Vidéo du projet ici</div>
          <h3>Jeu 2D</h3>
        </div>

        <div class="card">
          <div class="video-placeholder">Vidéo du projet ici</div>
          <h3>AI Demo</h3>
        </div>

      </div>

      <button class="arrow right" onclick="scrollProjects(1)">❯</button>

    </div>
  </section>

  <footer>
    <p>© 2026 Nolan Pestre</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
