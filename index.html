<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Pixel - Ton Nom</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
background:#0f172a;
color:#00ffcc;
font-family:'Press Start 2P', cursive;
margin:0;
text-align:center;
}

header{
padding:40px;
background:#020617;
border-bottom:4px solid #00ffcc;
}

h1{
font-size:24px;
text-shadow:4px 4px #ff00ff;
}

nav{
margin-top:20px;
}

nav a{
color:#00ffcc;
text-decoration:none;
margin:10px;
padding:10px 15px;
border:3px solid #00ffcc;
display:inline-block;
}

nav a:hover{
background:#00ffcc;
color:#020617;
transform:scale(1.1);
}

section{
padding:60px 20px;
}

.projets{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.carte{
background:#020617;
border:3px solid #00ffcc;
padding:20px;
width:250px;
box-shadow:6px 6px #ff00ff;
transition:0.3s;
}

.carte:hover{
transform:translateY(-10px);
box-shadow:10px 10px #ff00ff;
}

footer{
padding:30px;
border-top:4px solid #00ffcc;
margin-top:40px;
}

.pixel-btn{
display:inline-block;
margin-top:20px;
padding:15px 20px;
border:4px solid #00ffcc;
text-decoration:none;
color:#00ffcc;
}

.pixel-btn:hover{
background:#00ffcc;
color:#020617;
}

</style>
</head>

<body>

<header>
<h1>TON NOM</h1>
<p>Développeur Web Pixel</p>

<nav>
<a href="#about">PLAYER</a>
<a href="#projects">MISSIONS</a>
<a href="#contact">CONTACT</a>
</nav>
</header>

<section id="about">
<h2>PLAYER INFO</h2>
<p>Niveau 1 développeur web passionné par le code et les jeux rétro.</p>
</section>

<section id="projects">
<h2>MISSIONS</h2>

<div class="projets">

<div class="carte">
<h3>Projet 1</h3>
<p>Site web pixel.</p>
</div>

<div class="carte">
<h3>Projet 2</h3>
<p>Mini jeu HTML.</p>
</div>

<div class="carte">
<h3>Projet 3</h3>
<p>Application web.</p>
</div>

</div>

</section>

<section id="contact">
<h2>CONTACT</h2>
<a class="pixel-btn" href="#">Envoyer message</a>
</section>

<footer>
<p>© 2026 - Game Dev Portfolio</p>
</footer>

</body>
</html>
