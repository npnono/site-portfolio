<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Pixel - Ton Nom</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Press Start 2P', cursive;
  color:#00ffcc;
  background:#020617;
  overflow-x:hidden;
}

/* CANVAS FOND ÉTOILÉ */
#game-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2; /* derrière tout */
}

/* CANVAS CORDE */
#rope-canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0; /* devant les étoiles, derrière le texte */
}

/* HEADER */
header{
  text-align:center;
  padding:40px;
  border-bottom:4px solid #00ffcc;
  background:rgba(0,0,0,0.6);
}

h1{
  text-shadow:4px 4px #ff00ff;
}

/* MENU */
nav a{
  color:#00ffcc;
  text-decoration:none;
  margin:10px;
  padding:10px 15px;
  border:3px solid #00ffcc;
  display:inline-block;
}

nav a:hover{
  background:#00ffcc;
  color:#020617;
  transform:scale(1.1);
}

/* SECTIONS */
section{
  padding:60px 20px;
  text-align:center;
}

.projets{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.carte{
  background:#020617;
  border:3px solid #00ffcc;
  padding:20px;
  width:220px;
  box-shadow:6px 6px #ff00ff;
  transition:0.3s;
}

.carte:hover{
  transform:translateY(-10px);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  border-top:4px solid #00ffcc;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<canvas id="game-bg"></canvas>
<canvas id="rope-canvas"></canvas>

<header>
<h1>TON NOM</h1>
<p>Développeur Web Pixel</p>
<nav>
<a href="#about">PLAYER</a>
<a href="#projects">MISSIONS</a>
<a href="#contact">CONTACT</a>
</nav>
</header>

<section id="about">
<h2>PLAYER INFO</h2>
<p>Développeur web passionné par le code et les jeux rétro.</p>
</section>

<section id="projects">
<h2>MISSIONS</h2>
<div class="projets">
  <div class="carte">
    <h3>Projet 1</h3>
    <p>Site pixel.</p>
  </div>
  <div class="carte">
    <h3>Projet 2</h3>
    <p>Mini jeu.</p>
  </div>
  <div class="carte">
    <h3>Projet 3</h3>
    <p>Application web.</p>
  </div>
</div>
</section>

<section id="contact">
<h2>CONTACT</h2>
<p>Email : ton@email.com</p>
</section>

<footer>
<p>© 2026</p>
</footer>

<script>
// =======================
// FOND ÉTOILÉ
// =======================
const canvas = document.getElementById("game-bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0; i<150; i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5
  });
}

function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ffcc";
  stars.forEach(star=>{
    ctx.fillRect(star.x, star.y, star.size, star.size);
    star.y += star.speed;
    if(star.y > canvas.height){
      star.y = 0;
      star.x = Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(animateStars);
}
animateStars();

// =======================
// CANVAS CORDE
// =======================
const ropeCanvas = document.getElementById("rope-canvas");
const rctx = ropeCanvas.getContext("2d");
ropeCanvas.width = window.innerWidth;
ropeCanvas.height = window.innerHeight;

function drawRope(){
  rctx.clearRect(0,0,ropeCanvas.width,ropeCanvas.height);
  rctx.strokeStyle = "#00ffcc";
  rctx.lineWidth = 4;

  const x = ropeCanvas.width/2; // corde au milieu
  rctx.beginPath();
  rctx.moveTo(x,0);
  rctx.lineTo(x,ropeCanvas.height); // corde verticale jusqu'en bas
  rctx.stroke();

  requestAnimationFrame(drawRope);
}
drawRope();

// =======================
// Redimensionnement
// =======================
window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ropeCanvas.width = window.innerWidth;
  ropeCanvas.height = window.innerHeight;
});
</script>

</body>
</html>
